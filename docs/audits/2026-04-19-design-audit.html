          <div style={{fontWeight:600,fontSize:14,lineHeight:1.4,color:'var(--fg)'}}>{finding.title}</div>

function SectionFindings({ sectionId }) {
  const findings = FINDINGS[sectionId] || [];
  if (!findings.length) return null;
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  findings.forEach(f => counts[f.severity]++);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
        {Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>{
          const sev = SEVERITY_CONFIG[k];
          return <Pill key={k} label={`${v} ${sev.label}`} color={sev.color} bg={sev.bg} />;
        })}
      </div>
      {findings.map(f => <FindingCard key={f.id} finding={f} />)}
    </div>
  );
}

  const criticalCount = allFindings.filter(f=>f.severity==='critical').length;

  const totalCount = allFindings.length;

  const top3 = [

              <div style={{fontSize:11,color:'var(--muted-fg)',marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
        <p style={{fontSize:14,lineHeight:1.75,color:'var(--fg)'}}>

function App() {
  const [active, setActive] = useState('summary');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const contentRef = useRef(null);
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

  const section = SECTIONS.find(s => s.id === active);

  const renderContent = () => {
    if (active === 'summary') return <Summary />;
    if (active === 'roadmap') return <RoadmapView />;
    return (
      <div>
        {SECTION_DESCRIPTIONS[active] && (
          <p style={{fontSize:14,color:'var(--muted-fg)',lineHeight:1.7,marginBottom:20,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
            {SECTION_DESCRIPTIONS[active]}
          </p>
        )}
        <SectionFindings sectionId={active} />
      </div>
    );
  };

  return (
    <div style={{display:'flex',width:'100%',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside style={{
        width:240,
        flexShrink:0,
        background:'hsl(40,15%,97%)',
        borderRight:'1px solid var(--border)',
        display:'flex',
        flexDirection:'column',
        position:'sticky',
        top:0,
        height:'100vh',
        overflowY:'auto',
      }}>
        <div style={{padding:'20px 16px 12px'}}>
          <div style={{fontWeight:700,fontSize:16,color:'var(--primary)',letterSpacing:'-0.02em'}}>Prepio</div>
          <div style={{fontSize:11,color:'var(--muted-fg)',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:2}}>UX/UI Design Audit</div>
        </div>
        <div style={{padding:'4px 8px',flex:1}}>
          {SECTIONS.map(s => (
            <button
              key={s.id}
              onClick={() => { setActive(s.id); if(contentRef.current) contentRef.current.scrollTop = 0; }}
              style={{
                width:'100%',
                display:'flex',
                alignItems:'center',
                gap:10,
                padding:'8px 10px',
                borderRadius:8,
                border:'none',
                cursor:'pointer',
                background: active === s.id ? 'var(--primary-light)' : 'none',
                color: active === s.id ? 'var(--accent)' : 'var(--muted-fg)',
                fontWeight: active === s.id ? 600 : 400,
                fontSize:13,
                textAlign:'left',
                transition:'background 0.12s, color 0.12s',
                marginBottom:2,
              }}
            >
              <span style={{fontSize:14,flexShrink:0}}>{s.icon}</span>
              <span>{s.label}</span>
              {FINDINGS[s.id] && (
                <span style={{marginLeft:'auto',background:active===s.id?'var(--primary)':'var(--muted-bg)',color:active===s.id?'#fff':'var(--muted-fg)',fontSize:10,fontWeight:600,borderRadius:10,padding:'1px 6px',flexShrink:0}}>
                  {FINDINGS[s.id].length}
                </span>
              )}
            </button>
          ))}
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--muted-fg)',lineHeight:1.5}}>
          Audited April 2026<br/>Based on source code review
        </div>
      </aside>

      {/* Main */}
      <main ref={contentRef} style={{flex:1,overflowY:'auto',padding:'32px 40px',maxWidth:'100%'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.12em',color:'var(--primary)',marginBottom:6}}>
              {section?.icon} {section?.id === 'summary' ? 'Overview' : section?.id === 'roadmap' ? 'Action Plan' : 'Screen Analysis'}
            </div>
            <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.2,marginBottom:8}}>
              {section?.label}
            </h1>
          </div>

          {renderContent()}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
